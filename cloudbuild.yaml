steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/sunshine
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/sunshine

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sunshine
      - --image=gcr.io/$PROJECT_ID/sunshine
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=1
      - --set-env-vars=POLL_INTERVAL=30,SUNSHINE_DB_PATH=/tmp/sunshine.db
      - --set-secrets=ALPACA_API_KEY=alpaca-api-key:latest,ALPACA_SECRET_KEY=alpaca-secret-key:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest

timeout: 600s
